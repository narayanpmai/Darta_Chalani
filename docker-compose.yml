services:
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lgoms_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      # Database
      - ConnectionStrings__DefaultConnection=Host=db;Database=lgoms_db;Username=postgres;Password=password123
      # JWT — must match appsettings.json exactly
      - JwtSettings__Secret=SuperSecretKeyForLocalGovernmenteOfficeManagementSystem12345!@#
      - JwtSettings__Issuer=LGOMS_Api
      - JwtSettings__Audience=LGOMS_Client
      - JwtSettings__ExpiryInMinutes=480
      # Force HTTP only (no HTTPS redirect inside container)
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Browser uses relative /api — Next.js proxy rewrites to backend
      - NEXT_PUBLIC_API_URL=/api
      # Server-side proxy target (Docker internal hostname)
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
